name: ltsu_events
description: LTSU College Event Management System - Flutter Android App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2

  # QR Code Scanner
  mobile_scanner: ^3.5.5

  # Image Picker
  image_picker: ^1.0.7

  # State Management
  provider: ^6.1.1

  # JWT Decoder
  jwt_decoder: ^2.0.1

  # Network Connectivity
  connectivity_plus: ^5.0.2

  # Firebase Push Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  flutter_local_notifications: 17.2.4

  # Cached Images
  cached_network_image: ^3.3.1

  # Date Formatting
  intl: ^0.18.1

  # Charts
  fl_chart: ^0.66.0

  # Permissions
  permission_handler: ^11.1.0

  # Icons
  cupertino_icons: ^1.0.6

  # QR Code Generation
  qr_flutter: ^4.1.0

  # URL Launcher
  url_launcher: ^6.2.3

  # File Picker
  file_picker: 8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
